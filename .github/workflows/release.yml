name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to re-release (e.g. v1.2-beta.3). Leave empty to create a new beta.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for tag counting

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all versions
        run: chmod +x gradlew && ./gradlew build

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)

          if [[ -n "${{ inputs.tag }}" ]]; then
            # Manual dispatch with explicit tag
            TAG="${{ inputs.tag }}"
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            if [[ "$VERSION" == *-beta* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              echo "name=$TAG (Beta)" >> "$GITHUB_OUTPUT"
              echo "version_type=beta" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              echo "name=$TAG" >> "$GITHUB_OUTPUT"
              echo "version_type=release" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Stable release: use the pushed tag directly
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "name=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "version_type=release" >> "$GITHUB_OUTPUT"
          else
            # Beta release: count beta tags for this base version
            BETA_COUNT=$(git tag -l "v${BASE_VERSION}-beta.*" | wc -l)
            NEXT_BETA=$((BETA_COUNT + 1))
            VERSION="${BASE_VERSION}-beta.${NEXT_BETA}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "name=v$VERSION (Beta)" >> "$GITHUB_OUTPUT"
            echo "version_type=beta" >> "$GITHUB_OUTPUT"
          fi

          echo "Resolved version: $VERSION"

      - name: Rename build artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for mc_dir in versions/*/; do
            mc_ver=$(basename "$mc_dir")
            libs_dir="${mc_dir}build/libs"
            [ -d "$libs_dir" ] || continue
            for jar in "$libs_dir"/*.jar; do
              [[ "$jar" == *-sources.jar ]] && continue
              [[ -f "$jar" ]] || continue
              new_name="$libs_dir/ninja-utilities-${VERSION}+${mc_ver}.jar"
              if [ "$jar" != "$new_name" ]; then
                mv "$jar" "$new_name"
                echo "Renamed: $(basename "$jar") -> $(basename "$new_name")"
              fi
            done
          done

      - name: Create tag (beta only)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && inputs.tag == '' }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "$TAG" | head -1 || true)

          # Get merged PRs since last tag
          PR_SECTION=""
          if [ -n "$PREV_TAG" ]; then
            PREV_DATE=$(git log -1 --format=%aI "$PREV_TAG")
            PRS=$(gh pr list --state merged --base main --search "merged:>=$PREV_DATE" --json number,title,body --jq '.[] | "### #\(.number) — \(.title)\n\(.body // "No description provided.")\n"' 2>/dev/null || true)
          else
            PRS=$(gh pr list --state merged --base main --limit 10 --json number,title,body --jq '.[] | "### #\(.number) — \(.title)\n\(.body // "No description provided.")\n"' 2>/dev/null || true)
          fi

          if [ -n "$PRS" ]; then
            PR_SECTION="## Pull Requests
          $PRS"
          fi

          # Get commit log
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" -- . ':!.github')
          else
            COMMITS=$(git log --pretty=format:"- %s" HEAD -- . ':!.github' | head -30)
          fi

          # Combine into changelog
          {
            if [ -n "$PR_SECTION" ]; then
              echo "$PR_SECTION"
              echo ""
            fi
            echo "## Commits"
            echo "$COMMITS"
          } > /tmp/changelog.txt

          echo "Changelog:"
          cat /tmp/changelog.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: /tmp/changelog.txt
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            versions/1.21.10/build/libs/*[!-sources].jar
            versions/1.21.11/build/libs/*[!-sources].jar

      - name: Update existing release
        if: steps.check_release.outputs.exists == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          CHANGELOG=$(cat /tmp/changelog.txt)

          # Update release body and upload new assets
          gh release edit "$TAG" --notes "$CHANGELOG"
          gh release upload "$TAG" \
            versions/1.21.10/build/libs/*[!-sources].jar \
            versions/1.21.11/build/libs/*[!-sources].jar \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to Modrinth
        if: ${{ vars.MODRINTH_PROJECT_ID != '' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_TYPE="${{ steps.version.outputs.version_type }}"
          TAG="${{ steps.version.outputs.tag }}"

          CHANGELOG=$(cat /tmp/changelog.txt)

          # Create a separate Modrinth version for each MC version
          for mc_dir in versions/*/; do
            MC_VER=$(basename "$mc_dir")
            JAR_PATH="${mc_dir}build/libs/ninja-utilities-${VERSION}+${MC_VER}.jar"
            VERSION_NUMBER="${VERSION}+${MC_VER}"

            if [ ! -f "$JAR_PATH" ]; then
              echo "Warning: $JAR_PATH not found, skipping"
              continue
            fi

            # Check if this version already exists on Modrinth
            EXISTING_ID=$(curl -s "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}/version" \
              -H "Authorization: $MODRINTH_TOKEN" \
              | jq -r --arg vn "$VERSION_NUMBER" '.[] | select(.version_number == $vn) | .id // empty' || true)

            if [ -n "$EXISTING_ID" ]; then
              echo "Version ${VERSION_NUMBER} exists (ID: $EXISTING_ID), deleting before re-creating..."
              DEL_RESPONSE=$(curl -s -w "\n%{http_code}" -X DELETE "https://api.modrinth.com/v2/version/${EXISTING_ID}" \
                -H "Authorization: $MODRINTH_TOKEN")
              DEL_CODE=$(echo "$DEL_RESPONSE" | tail -1)
              if [ "$DEL_CODE" -ge 200 ] && [ "$DEL_CODE" -lt 300 ]; then
                echo "Deleted existing version"
              else
                echo "::warning::Failed to delete existing version (HTTP $DEL_CODE), attempting to create anyway..."
              fi
            fi

            DATA=$(jq -n \
              --arg name "${TAG} for ${MC_VER}" \
              --arg version "$VERSION_NUMBER" \
              --arg changelog "$CHANGELOG" \
              --arg type "$VERSION_TYPE" \
              --arg project "$MODRINTH_PROJECT_ID" \
              --arg mc_ver "$MC_VER" \
              '{
                name: $name,
                version_number: $version,
                changelog: $changelog,
                dependencies: [],
                game_versions: [$mc_ver],
                version_type: $type,
                loaders: ["fabric"],
                featured: true,
                project_id: $project,
                file_parts: ["file"]
              }')

            echo "Publishing to Modrinth: ${VERSION_NUMBER} ($VERSION_TYPE)"
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.modrinth.com/v2/version" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -F "data=$DATA" \
              -F "file=@$JAR_PATH")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Published ${MC_VER} to Modrinth successfully"
            else
              echo "::error::Modrinth publish failed for ${MC_VER} (HTTP $HTTP_CODE): $BODY"
              exit 1
            fi
          done
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
