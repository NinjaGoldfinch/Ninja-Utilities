name: Release

on:
  push:
    branches: [development]
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for tag counting

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all versions
        run: chmod +x gradlew && ./gradlew build

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Stable release: use the pushed tag directly
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "name=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "version_type=release" >> "$GITHUB_OUTPUT"
          else
            # Beta release: count beta tags for this base version
            BETA_COUNT=$(git tag -l "v${BASE_VERSION}-beta.*" | wc -l)
            NEXT_BETA=$((BETA_COUNT + 1))
            VERSION="${BASE_VERSION}-beta.${NEXT_BETA}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "name=v$VERSION (Beta)" >> "$GITHUB_OUTPUT"
            echo "version_type=beta" >> "$GITHUB_OUTPUT"
          fi

          echo "Resolved version: $VERSION"

      - name: Rename build artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for mc_dir in versions/*/; do
            mc_ver=$(basename "$mc_dir")
            libs_dir="${mc_dir}build/libs"
            [ -d "$libs_dir" ] || continue
            for jar in "$libs_dir"/*.jar; do
              [[ "$jar" == *-sources.jar ]] && continue
              [[ -f "$jar" ]] || continue
              new_name="$libs_dir/ninja-utilities-${VERSION}+${mc_ver}.jar"
              if [ "$jar" != "$new_name" ]; then
                mv "$jar" "$new_name"
                echo "Renamed: $(basename "$jar") -> $(basename "$new_name")"
              fi
            done
          done

      - name: Create tag (beta only)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate changelog
        run: |
          # Get the previous tag for changelog diff
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "${{ steps.version.outputs.tag }}" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" -- . ':!.github')
          else
            LOG=$(git log --pretty=format:"- %s" HEAD -- . ':!.github' | head -30)
          fi

          # Write to file to avoid escaping issues
          echo "$LOG" > /tmp/changelog.txt
          echo "Changelog:"
          cat /tmp/changelog.txt

      - name: Create release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: /tmp/changelog.txt
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            versions/1.21.10/build/libs/*[!-sources].jar
            versions/1.21.11/build/libs/*[!-sources].jar

      - name: Upload assets to existing release
        if: steps.check_release.outputs.exists == 'true'
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            versions/1.21.10/build/libs/*[!-sources].jar \
            versions/1.21.11/build/libs/*[!-sources].jar \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to Modrinth
        if: ${{ secrets.MODRINTH_TOKEN != '' }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_TYPE="${{ steps.version.outputs.version_type }}"
          TAG="${{ steps.version.outputs.tag }}"

          CHANGELOG=$(cat /tmp/changelog.txt)

          # Collect game versions from build directories
          GAME_VERSIONS=$(for d in versions/*/; do basename "$d"; done | jq -R . | jq -s .)

          # Build version metadata
          DATA=$(jq -n \
            --arg name "$TAG" \
            --arg version "$VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg type "$VERSION_TYPE" \
            --arg project "$MODRINTH_PROJECT_ID" \
            --argjson game_versions "$GAME_VERSIONS" \
            '{
              name: $name,
              version_number: $version,
              changelog: $changelog,
              dependencies: [],
              game_versions: $game_versions,
              version_type: $type,
              loaders: ["fabric"],
              featured: true,
              project_id: $project,
              file_parts: ["file-1.21.10", "file-1.21.11"]
            }')

          echo "Publishing to Modrinth: $VERSION ($VERSION_TYPE)"
          curl -sf -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: $MODRINTH_TOKEN" \
            -F "data=$DATA" \
            -F "file-1.21.10=@versions/1.21.10/build/libs/ninja-utilities-${VERSION}+1.21.10.jar" \
            -F "file-1.21.11=@versions/1.21.11/build/libs/ninja-utilities-${VERSION}+1.21.11.jar"

          echo "Published to Modrinth successfully"
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
