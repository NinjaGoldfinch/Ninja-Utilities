name: Release

on:
  push:
    branches: [main, development]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for tag counting

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all versions
        run: chmod +x gradlew && ./gradlew build

      - name: Determine version
        id: version
        run: |
          # Read base version from gradle.properties
          BASE_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          BRANCH="${GITHUB_REF_NAME}"

          if [ "$BRANCH" = "main" ]; then
            # Stable release: count existing stable tags to bump patch
            PATCH=$(git tag -l "v${BASE_VERSION%.*}.*" --sort=-v:refname | grep -v beta | head -1 | sed 's/v[0-9]*\.[0-9]*\.//' || echo "-1")
            if [ -z "$PATCH" ] || [ "$PATCH" = "-1" ]; then
              VERSION="$BASE_VERSION"
            else
              NEXT_PATCH=$((PATCH + 1))
              MAJOR_MINOR="${BASE_VERSION%.*}"
              VERSION="${MAJOR_MINOR}.${NEXT_PATCH}"
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "name=v$VERSION" >> "$GITHUB_OUTPUT"
          else
            # Beta release: count beta tags for this base version
            BETA_COUNT=$(git tag -l "v${BASE_VERSION}-beta.*" | wc -l)
            NEXT_BETA=$((BETA_COUNT + 1))
            VERSION="${BASE_VERSION}-beta.${NEXT_BETA}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "name=v$VERSION (Beta)" >> "$GITHUB_OUTPUT"
          fi

          echo "Resolved version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag for changelog diff
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "${{ steps.version.outputs.tag }}" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" -- . ':!.github')
          else
            LOG=$(git log --pretty=format:"- %s" HEAD -- . ':!.github' | head -30)
          fi

          # Write to file to avoid escaping issues
          echo "$LOG" > /tmp/changelog.txt
          echo "Changelog:"
          cat /tmp/changelog.txt

      - name: Create release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: /tmp/changelog.txt
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            versions/1.21.10/build/libs/*[!-sources].jar
            versions/1.21.11/build/libs/*[!-sources].jar
