name: Build

on:
  push:
    branches-ignore: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all versions
        run: chmod +x gradlew && ./gradlew build

      - name: Upload artifacts (1.21.10)
        uses: actions/upload-artifact@v4
        with:
          name: ninja-utilities-1.21.10
          path: versions/1.21.10/build/libs/*[!-sources].jar

      - name: Upload artifacts (1.21.11)
        uses: actions/upload-artifact@v4
        with:
          name: ninja-utilities-1.21.11
          path: versions/1.21.11/build/libs/*[!-sources].jar
